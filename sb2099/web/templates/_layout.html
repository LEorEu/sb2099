<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}sb2099 — 斗鱼2099房间烂梗收集与一键发送站{% endblock %}</title>
  <link rel="stylesheet" href="/static/sb2099.css">
  <script>
    (function() {
      try {
        var t = localStorage.getItem('sb2099-theme') || 'dark';
        document.documentElement.setAttribute('data-theme', t);
      } catch (e) {}
    })();
  </script>
</head>
<body>
  <script src="/static/sb2099.js" defer></script>

  <!-- Premium Glass Top Bar -->
  <header class="topbar">
    <div class="topbar-left">
      <a class="brand" href="/">sb2099</a>
    </div>
    <nav class="topbar-center">
      <a href="/" class="{% if request.url.path == '/' %}active{% endif %}">首页</a>
      <a href="/barrage" class="{% if request.url.path.startswith('/barrage') %}active{% endif %}">全部烂梗</a>
      <a href="/live" class="{% if request.url.path.startswith('/live') %}active{% endif %}">热门弹幕</a>
    </nav>
    <div class="topbar-right">
      {% include "_topbar_tools.html" %}
    </div>
  </header>

  <!-- Main Content Body Container -->
  <main>
    {% block content %}{% endblock %}
  </main>

  <!-- Isomorphic Global Submission Popup Modal -->
  <div class="modal-overlay" id="global-modal-overlay">
    <div class="modal-container">
      <div class="modal-header">
        <h3 class="modal-title">投稿一条烂梗</h3>
        <button class="modal-close" data-action="close-modal">&times;</button>
      </div>
      <div class="modal-body">
        <form data-form="modal-submit-form" method="post">
          <input type="hidden" id="modal-mode" value="normal">
          <input type="hidden" id="modal-item-id" value="">
          <textarea name="content" required placeholder="写点什么… (最大 255 字)" maxlength="255"></textarea>
          <div class="tag-pick">
            {% for t in tags %}
              <label>
                <input type="checkbox" name="tags" value="{{ t.value }}">
                {{ t.label }}
              </label>
            {% endfor %}
          </div>
          <div class="user-picker" data-user-picker>
            <input type="hidden" name="submitter_uid" value="">
            <button type="button" class="user-picker-trigger">
              <span class="user-picker-placeholder">选择我是谁（可选）</span>
              <div class="user-picker-chip" hidden>
                <img class="user-picker-avatar" alt="">
                <span class="user-picker-name"></span>
                <span class="user-picker-clear" title="清除">×</span>
              </div>
            </button>
            <div class="user-picker-search" hidden>
              <input type="text" class="user-picker-input" placeholder="昵称或 UID（≥3 字符）" autocomplete="off">
              <ul class="user-picker-results"></ul>
            </div>
            <label class="user-picker-anon">
              <input type="checkbox" name="anonymous"> 本条匿名投稿（仍可绑定身份，本条不署名）
            </label>
          </div>
          <button type="submit" class="btn btn-primary" style="width: 100%; border-radius: 8px;">提交投稿</button>
        </form>
      </div>
    </div>
  </div>

  <!-- Premium Bottom Footer -->
  <footer class="foot">
    <span>斗鱼 2099 房间（真实短号：2099，主播：一团肉松子）</span>
    <span>仅记录 IP 哈希 · 原始弹幕 30 天后自动归档 · 绝无广告转售</span>
  </footer>
</body>
</html>
