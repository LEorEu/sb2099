<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}sb2099 — 斗鱼2099房间烂梗收集与一键发送站{% endblock %}</title>
  <link rel="stylesheet" href="/static/sb2099.css">
</head>
<body>
  <script src="/static/sb2099.js" defer></script>
  
  <!-- Premium Glass Top Bar -->
  <header class="topbar">
    <a class="brand" href="/">sb2099</a>
    <nav>
      <a href="/" class="{% if request.url.path == '/' %}active{% endif %}">首页</a>
      <a href="/barrage" class="{% if request.url.path.startswith('/barrage') %}active{% endif %}">全部烂梗</a>
      <a href="/live" class="{% if request.url.path.startswith('/live') %}active{% endif %}">热门弹幕</a>
      <a href="/userscript" class="us">油猴脚本</a>
    </nav>
  </header>

  <!-- Main Content Body Container -->
  <main>
    {% block content %}{% endblock %}
  </main>

  <!-- Isomorphic Global Submission Popup Modal -->
  <div class="modal-overlay" id="global-modal-overlay">
    <div class="modal-container">
      <div class="modal-header">
        <h3 class="modal-title">投稿一条烂梗</h3>
        <button class="modal-close" data-action="close-modal">&times;</button>
      </div>
      <div class="modal-body">
        <form data-form="modal-submit-form" method="post">
          <input type="hidden" id="modal-mode" value="normal">
          <input type="hidden" id="modal-item-id" value="">
          <textarea name="content" required placeholder="写点什么… (最大 255 字)" maxlength="255"></textarea>
          <div class="tag-pick">
            {% for t in tags %}
              <label>
                <input type="checkbox" name="tags" value="{{ t.value }}">
                {{ t.label }}
              </label>
            {% endfor %}
          </div>
          <button type="submit" class="btn btn-primary" style="width: 100%; border-radius: 8px;">提交投稿</button>
        </form>
      </div>
    </div>
  </div>

  <!-- Premium Bottom Footer -->
  <footer class="foot">
    <span>斗鱼 2099 房间（真实短号：2099，主播：一团肉松子）</span>
    <span>仅记录 IP 哈希 · 原始弹幕 30 天后自动归档 · 绝无广告转售</span>
  </footer>
</body>
</html>
