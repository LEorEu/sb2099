<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>后台登录 — sb2099 管理端</title>
  <link rel="stylesheet" href="/static/sb2099.css">
</head>
<body class="admin login">
  <main class="login-box animate-fade" style="margin-top: 15vh;">
    <h1>sb2099 后台登录</h1>
    
    {% if err %}
      <p class="err">⚠️ Token 错误，登录失败，请重试！</p>
    {% endif %}
    
    <form method="post" action="/admin/login">
      <input type="hidden" name="next" value="{{ next }}">
      <input type="password" name="token" placeholder="请输入 SB2099_ADMIN_TOKEN" autofocus required>
      <button type="submit" class="btn btn-primary">验证并登录</button>
    </form>
    
    <p class="hint">安全提示：后台不设默认密码，必须通过配置系统环境变量 <code>SB2099_ADMIN_TOKEN</code> 来指定访问口令。</p>
  </main>
</body>
</html>
