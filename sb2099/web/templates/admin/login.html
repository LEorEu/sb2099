<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>登录 — sb2099 后台</title>
  <link rel="stylesheet" href="/static/sb2099.css">
</head>
<body class="admin login">
  <main class="login-box">
    <h1>sb2099 后台登录</h1>
    {% if err %}<p class="err">Token 错误，请重试。</p>{% endif %}
    <form method="post" action="/admin/login">
      <input type="hidden" name="next" value="{{ next }}">
      <input type="password" name="token" placeholder="SB2099_ADMIN_TOKEN" autofocus required>
      <button type="submit">登录</button>
    </form>
    <p class="hint">未配置默认密码——token 在部署时通过环境变量 `SB2099_ADMIN_TOKEN` 注入。</p>
  </main>
</body>
</html>
