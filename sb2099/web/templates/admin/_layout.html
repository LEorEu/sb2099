<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}sb2099 后台控制板{% endblock %}</title>
  <link rel="stylesheet" href="/static/sb2099.css">
  <script>
    (function() {
      try {
        var t = localStorage.getItem('sb2099-theme') || 'dark';
        document.documentElement.setAttribute('data-theme', t);
      } catch (e) {}
    })();
  </script>
</head>
<body class="admin">
  <script src="/static/sb2099.js" defer></script>

  <!-- Premium Admin Navbar -->
  <header class="topbar">
    <div class="topbar-left">
      <a class="brand" href="/admin/settings">sb2099</a>
    </div>
    <nav class="topbar-center">
      <a href="/admin/settings" class="{% if request.url.path == '/admin/settings' %}active{% endif %}">设置</a>
      <a href="/admin/tags" class="{% if request.url.path == '/admin/tags' %}active{% endif %}">标签</a>
      <a href="/admin/barrage/pending" class="{% if request.url.path == '/admin/barrage/pending' %}active{% endif %}">待审</a>
      <a href="/admin/barrage/reports" class="{% if request.url.path == '/admin/barrage/reports' %}active{% endif %}">反馈</a>
      <a href="/admin/live_hot" class="{% if request.url.path.startswith('/admin/live_hot') %}active{% endif %}">直播热门</a>
      <a href="/admin/barrage/_trash" class="{% if request.url.path == '/admin/barrage/_trash' %}active{% endif %}">回收站</a>
      <a href="/admin/stats" class="{% if request.url.path == '/admin/stats' %}active{% endif %}">统计</a>
    </nav>
    <div class="topbar-right">
      <button type="button" class="icon-btn" data-action="toggle-theme" aria-label="切换主题" title="切换主题">
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="4"></circle>
          <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"></path>
        </svg>
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
      </button>
      <a class="icon-btn" href="/" aria-label="返回主站" title="返回主站">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M3 12L12 3l9 9"></path>
          <path d="M5 10v10h14V10"></path>
        </svg>
      </a>
      <form method="post" action="/admin/logout" style="display:inline">
        <button type="submit" class="icon-btn" aria-label="登出" title="登出">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
            <polyline points="16 17 21 12 16 7"></polyline>
            <line x1="21" y1="12" x2="9" y2="12"></line>
          </svg>
        </button>
      </form>
    </div>
  </header>

  <!-- Content body container -->
  <main>
    {% block content %}{% endblock %}
  </main>

  <!-- Footer block -->
  <footer class="foot">
    <span>sb2099 后台管理控制面板 · 隐私与合规守护模式已激活</span>
    <span>原始弹幕 30 天自动清理</span>
  </footer>
</body>
</html>
